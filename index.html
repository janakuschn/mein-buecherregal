<body>
    <div id="app"></div>
    
    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://qzdgpfwlheitxegcgvzf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bqqcDxkFE2PX_gqoESsvOA_p9CeVw9c';
        
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        let appState = {
            isLoggedIn: false,
            user: null,
            showRatings: false,
            currentTab: 'aktuell',
            selectedBook: null,
            books: [],
            showModal: false,
            modalMode: null,
            expandedYears: new Set(),
            isLoginMode: true, // true = login, false = signup
            isSyncing: false,
        };
        
        // ============================================
        // BOOK MANAGEMENT
        // ============================================
        
        class BookManager {
            static async addBook(title, author, status, coverData) {
                if (!appState.user) return;
                
                try {
                    const { data, error } = await supabase
                        .from('books')
                        .insert([{
                            user_id: appState.user.id,
                            title: title || 'Unbekannter Titel',
                            author: author || 'Unbekannter Autor',
                            status: status || 'ungelesen',
                            rating: 0,
                            notes: '',
                            cover_image_data: coverData || null,
                        }])
                        .select();
                    
                    if (error) throw error;
                    
                    await this.loadBooks();
                    render();
                } catch (error) {
                    console.error('Error adding book:', error);
                    alert('Fehler beim Speichern des Buches');
                }
            }
            
            static async updateBook(id, updates) {
                if (!appState.user) return;
                
                try {
                    const { error } = await supabase
                        .from('books')
                        .update(updates)
                        .eq('id', id)
                        .eq('user_id', appState.user.id);
                    
                    if (error) throw error;
                    
                    await this.loadBooks();
                    render();
                } catch (error) {
                    console.error('Error updating book:', error);
                    alert('Fehler beim Aktualisieren des Buches');
                }
            }
            
            static async deleteBook(id) {
                if (!appState.user) return;
                
                try {
                    const { error } = await supabase
                        .from('books')
                        .delete()
                        .eq('id', id)
                        .eq('user_id', appState.user.id);
                    
                    if (error) throw error;
                    
                    await this.loadBooks();
                    render();
                } catch (error) {
                    console.error('Error deleting book:', error);
                    alert('Fehler beim Löschen des Buches');
                }
            }
            
            static async loadBooks() {
                if (!appState.user) {
                    appState.books = [];
                    return;
                }
                
                try {
                    const { data, error } = await supabase
                        .from('books')
                        .select('*')
                        .eq('user_id', appState.user.id);
                    
                    if (error) throw error;
                    
                    appState.books = data || [];
                } catch (error) {
                    console.error('Error loading books:', error);
                }
            }
            
            static getByStatus(status) {
                return appState.books.filter(b => b.status === status);
            }
            
            static getGelesenByYear() {
                const gelesen = this.getByStatus('gelesen');
                const years = [...new Set(gelesen.map(b => b.finished_year).filter(Boolean))].sort((a, b) => b - a);
                return years.map(year => ({
                    year,
                    months: this.getMonthsForYear(year, gelesen)
                }));
            }
            
            static getMonthsForYear(year, books) {
                const monthBooks = {};
                books.filter(b => b.finished_year === year).forEach(b => {
                    const month = b.finished_month || 0;
                    if (!monthBooks[month]) monthBooks[month] = [];
                    monthBooks[month].push(b);
                });
                return Object.entries(monthBooks).map(([m, bs]) => ({
                    month: parseInt(m),
                    books: bs
                })).sort((a, b) => b.month - a.month);
            }
        }
        
        // ============================================
        // UI RENDERING
        // ============================================
        
        const monthNames = ['', 'Januar', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
        
        function renderBookCard(book) {
            let html = '<div class="book-card" data-id="' + book.id + '">';
            
            if (book.cover_image_data) {
                html += '<div class="book-cover"><img src="' + book.cover_image_data + '" alt="' + book.title + '"></div>';
            } else {
                html += '<div class="book-cover">📖</div>';
            }
            
            if (appState.showRatings) {
                html += '<div class="book-rating">';
                for (let i = 1; i <= 5; i++) {
                    html += `<span class="${i <= book.rating ? 'star' : 'star-empty'}">★</span>`;
                }
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }
        
        function renderLoginModal() {
            let html = `
                <div class="login-container">
                    <div class="login-box">
                        <h1>📚 Mein Bücherregal</h1>
                        <p>Deine private Buchsammlung</p>
                        
                        ${appState.isLoginMode ? `
                            <div id="loginForm">
                                <div class="form-group">
                                    <label>E-Mail</label>
                                    <input type="email" id="loginEmail" placeholder="deine@email.de" autocomplete="email">
                                </div>
                                <div class="form-group">
                                    <label>Passwort</label>
                                    <input type="password" id="loginPassword" placeholder="Passwort" autocomplete="off">
                                </div>
                                <button class="login-btn" id="loginSubmit">Anmelden</button>
                                <button class="toggle-link" id="toSignup">Noch kein Konto? Registrieren</button>
                                <div id="loginError" class="error-message"></div>
                            </div>
                        ` : `
                            <div id="signupForm">
                                <div class="form-group">
                                    <label>E-Mail</label>
                                    <input type="email" id="signupEmail" placeholder="deine@email.de" autocomplete="email">
                                </div>
                                <div class="form-group">
                                    <label>Passwort</label>
                                    <input type="password" id="signupPassword" placeholder="Mindestens 6 Zeichen" autocomplete="off">
                                </div>
                                <div class="form-group">
                                    <label>Passwort wiederholen</label>
                                    <input type="password" id="signupConfirm" placeholder="Bestätigen" autocomplete="off">
                                </div>
                                <button class="login-btn" id="signupSubmit">Registrieren</button>
                                <button class="toggle-link" id="toLogin">Bereits registriert? Anmelden</button>
                                <div id="signupError" class="error-message"></div>
                            </div>
                        `}
                    </div>
                </div>
            `;
            return html;
        }
        
        function renderMainApp() {
            const aktuell = BookManager.getByStatus('aktuell');
            const gelesen = BookManager.getByStatus('gelesen');
            const ungelesen = BookManager.getByStatus('ungelesen');
            const wunsch = BookManager.getByStatus('wunsch');
            
            let html = `
                <div class="app-container">
                    <div class="app-header">
                        <div class="header-top">
                            <h1>Mein Bücherregal</h1>
                            <div class="header-actions">
                                <button class="header-btn ${appState.showRatings ? 'active' : ''}" id="ratingToggle">⭐</button>
                                <button class="logout-btn" id="logoutBtn">Abmelden</button>
                            </div>
                        </div>
                        <div class="tabs">
                            <button class="tab ${appState.currentTab === 'aktuell' ? 'active' : ''}" data-tab="aktuell">Aktuell</button>
                            <button class="tab ${appState.currentTab === 'gelesen' ? 'active' : ''}" data-tab="gelesen">Gelesen</button>
                            <button class="tab ${appState.currentTab === 'ungelesen' ? 'active' : ''}" data-tab="ungelesen">Ungelesen</button>
                        </div>
                    </div>
                    
                    <div class="tab-content ${appState.currentTab === 'aktuell' ? 'active' : ''}">
                        ${aktuell.length === 0 ? `
                            <div class="empty-state">
                                <div class="empty-state-icon">📚</div>
                                <div class="empty-state-text">Keine aktuellen Bücher</div>
                                <div class="empty-state-desc">Starte ein neues Buch und verschiebe es hier hin</div>
                            </div>
                        ` : `<div class="book-grid">${aktuell.map(renderBookCard).join('')}</div>`}
                    </div>
                    
                    <div class="tab-content ${appState.currentTab === 'gelesen' ? 'active' : ''}">
                        ${gelesen.length === 0 ? `
                            <div class="empty-state">
                                <div class="empty-state-icon">📚</div>
                                <div class="empty-state-text">Keine gelesenen Bücher</div>
                                <div class="empty-state-desc">Markiere Bücher als gelesen und gib das Datum an</div>
                            </div>
                        ` : `
                            <div class="year-section">
                                ${BookManager.getGelesenByYear().map(({year, months}) => `
                                    <div>
                                        <button class="year-header" data-year="${year}">
                                            <h3>${year}</h3>
                                            <div class="year-toggle">${appState.expandedYears.has(year) ? '▼' : '▶'}</div>
                                        </button>
                                        ${appState.expandedYears.has(year) ? `
                                            <div style="background: white;">
                                                ${months.map(({month, books: monthBooks}) => `
                                                    <div class="month-header">${month > 0 ? monthNames[month] : 'Kein Datum'}</div>
                                                    <div class="month-books book-grid" style="gap: 14px; padding: 0 14px 14px; grid-template-columns: repeat(3, 1fr);">
                                                        ${monthBooks.map(renderBookCard).join('')}
                                                    </div>
                                                `).join('')}
                                            </div>
                                        ` : `
                                            <div class="book-grid">
                                                ${months.flatMap(m => m.books).map(renderBookCard).join('')}
                                            </div>
                                        `}
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                    
                    <div class="tab-content ${appState.currentTab === 'ungelesen' ? 'active' : ''}">
                        <div class="ungelesen-section">
                            <div class="section-title">Ungelesen</div>
                            ${ungelesen.length === 0 ? `
                                <div style="font-size: 14px; color: #999; padding: 20px 0;">Keine ungelesenen Bücher</div>
                            ` : `
                                <div class="book-grid" style="padding: 0 0 14px 0;">
                                    ${ungelesen.map(renderBookCard).join('')}
                                </div>
                            `}
                        </div>
                        
                        <div class="ungelesen-section">
                            <div class="section-title">Wunsch</div>
                            ${wunsch.length === 0 ? `
                                <div style="font-size: 14px; color: #999; padding: 20px 0;">Keine Bücher auf der Wunschliste</div>
                            ` : `
                                <div class="book-grid" style="padding: 0 0 14px 0;">
                                    ${wunsch.map(renderBookCard).join('')}
                                </div>
                            `}
                        </div>
                    </div>
                    
                    <button class="fab" id="addBtn">➕</button>
                </div>
            `;
            return html;
        }
        
        function renderDetailModal(book) {
            const currentYear = new Date().getFullYear();
            let html = `
                <div class="modal show detail-modal" id="detailModal" data-book-id="${book.id}">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Buchdetails</h2>
                            <button class="modal-close" id="closeDetail">✕</button>
                        </div>
                        
                        ${book.cover_image_data ? `<img src="${book.cover_image_data}" class="detail-cover" alt="${book.title}">` : '<div style="width:100%;height:200px;background:#f5f5f5;border-radius:10px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;font-size:48px;">📖</div>'}
                        
                        <div class="detail-title">${book.title}</div>
                        <div class="detail-author">${book.author}</div>
                        
                        <div class="detail-section">
                            <div class="detail-section-title">Meine Bewertung</div>
                            <div class="rating-container" id="detailRating">
                                ${Array.from({length: 5}, (_, i) => `<span class="rating-star ${i + 1 <= book.rating ? 'star' : 'star-empty'}" data-rating="${i + 1}">★</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="detail-section">
                            <div class="detail-section-title">Notizen</div>
                            <textarea class="notes-textarea" id="detailNotes" placeholder="Deine Gedanken zum Buch...">${book.notes || ''}</textarea>
                        </div>
                        
                        <div class="detail-section">
                            <div class="detail-section-title">Status</div>
                            <select class="dropdown" id="detailStatus">
                                <option value="aktuell" ${book.status === 'aktuell' ? 'selected' : ''}>Aktuell</option>
                                <option value="gelesen" ${book.status === 'gelesen' ? 'selected' : ''}>Gelesen</option>
                                <option value="ungelesen" ${book.status === 'ungelesen' ? 'selected' : ''}>Ungelesen</option>
                                <option value="wunsch" ${book.status === 'wunsch' ? 'selected' : ''}>Wunsch</option>
                            </select>
                        </div>
                        
                        ${book.status === 'gelesen' ? `
                            <div class="detail-section">
                                <div class="detail-section-title">Beendet</div>
                                <div class="dropdown-group">
                                    <div>
                                        <select class="dropdown" id="detailMonth">
                                            ${Array.from({length: 12}, (_, i) => `<option value="${i + 1}" ${book.finished_month === i + 1 ? 'selected' : ''}>${monthNames[i + 1]}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div>
                                        <select class="dropdown" id="detailYear">
                                            ${Array.from({length: currentYear - 2000 + 1}, (_, i) => {
                                                const y = currentYear - i;
                                                return `<option value="${y}" ${book.finished_year === y ? 'selected' : ''}>${y}</option>`;
                                            }).join('')}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="btn-group">
                            <button class="btn-secondary" id="closeDetailBtn">Schließen</button>
                            <button class="btn-primary" id="saveDetailBtn">Speichern</button>
                        </div>
                        
                        <button class="delete-btn" id="deleteBtn">Buch löschen</button>
                    </div>
                </div>
            `;
            return html;
        }
        
        function renderAddBookModal() {
            return `
                <div class="modal show" id="addBookModal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Buch hinzufügen</h2>
                            <button class="modal-close" id="closeAddBook">✕</button>
                        </div>
                        
                        <div id="addBookStep1">
                            <div class="add-book-options">
                                <button class="option-btn" id="cameraBtn">📷 Foto aufnehmen</button>
                                <button class="option-btn" id="galleryBtn">🖼️ Aus Galerie wählen</button>
                                <button class="option-btn" id="barcodeBtn">📱 Barcode scannen</button>
                            </div>
                            <div style="margin-top: 20px;">
                                <div class="form-group">
                                    <label>Titel</label>
                                    <input type="text" id="addTitle" placeholder="Buchtitel">
                                </div>
                                <div class="form-group">
                                    <label>Autor</label>
                                    <input type="text" id="addAuthor" placeholder="Autor">
                                </div>
                                <div class="form-group">
                                    <label>Status</label>
                                    <select class="dropdown" id="addStatus">
                                        <option value="aktuell">Aktuell</option>
                                        <option value="ungelesen">Ungelesen</option>
                                        <option value="wunsch">Wunsch</option>
                                        <option value="gelesen">Gelesen</option>
                                    </select>
                                </div>
                            </div>
                            <div id="addBookCover"></div>
                            <div class="btn-group">
                                <button class="btn-secondary" id="cancelAddBook">Abbrechen</button>
                                <button class="btn-primary" id="submitAddBook">Hinzufügen</button>
                            </div>
                        </div>
                        
                        <div id="barcodeScannerView" style="display: none;">
                            <div class="barcode-scanner-container">
                                <video id="video" autoplay playsinline></video>
                            </div>
                            <div style="text-align: center; padding: 10px; color: #999;">Richte den Barcode auf die Kamera</div>
                            <button class="btn-secondary" id="stopScanner">Scannen beenden</button>
                            <div id="scannerError" class="error-message"></div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function render() {
            const app = document.getElementById('app');
            
            if (!appState.isLoggedIn) {
                app.innerHTML = renderLoginModal();
                attachLoginEvents();
            } else {
                app.innerHTML = renderMainApp();
                attachMainEvents();
            }
        }
        
        // ============================================
        // EVENT HANDLERS
        // ============================================
        
        function attachLoginEvents() {
            if (appState.isLoginMode) {
                const loginEmail = document.getElementById('loginEmail');
                const loginPassword = document.getElementById('loginPassword');
                const loginSubmit = document.getElementById('loginSubmit');
                const loginError = document.getElementById('loginError');
                const toSignup = document.getElementById('toSignup');
                
                loginSubmit.addEventListener('click', async () => {
                    const email = loginEmail.value.trim();
                    const pwd = loginPassword.value.trim();
                    
                    if (!email || !pwd) {
                        loginError.textContent = 'Bitte beide Felder ausfüllen';
                        return;
                    }
                    
                    loginSubmit.disabled = true;
                    loginSubmit.textContent = 'Wird angemeldet...';
                    
                    try {
                        const { data, error } = await supabase.auth.signInWithPassword({
                            email,
                            password: pwd,
                        });
                        
                        if (error) throw error;
                        
                        appState.isLoggedIn = true;
                        appState.user = data.user;
                        await BookManager.loadBooks();
                        render();
                    } catch (error) {
                        loginError.textContent = error.message || 'Anmeldung fehlgeschlagen';
                        loginSubmit.disabled = false;
                        loginSubmit.textContent = 'Anmelden';
                    }
                });
                
                loginPassword.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') loginSubmit.click();
                });
                
                toSignup.addEventListener('click', (e) => {
                    e.preventDefault();
                    appState.isLoginMode = false;
                    render();
                });
            } else {
                const signupEmail = document.getElementById('signupEmail');
                const signupPassword = document.getElementById('signupPassword');
                const signupConfirm = document.getElementById('signupConfirm');
                const signupSubmit = document.getElementById('signupSubmit');
                const signupError = document.getElementById('signupError');
                const toLogin = document.getElementById('toLogin');
                
                signupSubmit.addEventListener('click', async () => {
                    const email = signupEmail.value.trim();
                    const pwd = signupPassword.value.trim();
                    const confirm = signupConfirm.value.trim();
                    
                    if (!email || !pwd || !confirm) {
                        signupError.textContent = 'Bitte alle Felder ausfüllen';
                        return;
                    }
                    
                    if (pwd.length < 6) {
                        signupError.textContent = 'Passwort muss mindestens 6 Zeichen lang sein';
                        return;
                    }
                    
                    if (pwd !== confirm) {
                        signupError.textContent = 'Passwörter stimmen nicht überein';
                        return;
                    }
                    
                    signupSubmit.disabled = true;
                    signupSubmit.textContent = 'Wird registriert...';
                    
                    try {
                        const { data, error } = await supabase.auth.signUp({
                            email,
                            password: pwd,
                        });
                        
                        if (error) throw error;
                        
                        appState.isLoggedIn = true;
                        appState.user = data.user;
                        appState.books = [];
                        render();
                    } catch (error) {
                        signupError.textContent = error.message || 'Registrierung fehlgeschlagen';
                        signupSubmit.disabled = false;
                        signupSubmit.textContent = 'Registrieren';
                    }
                });
                
                toLogin.addEventListener('click', (e) => {
                    e.preventDefault();
                    appState.isLoginMode = true;
                    render();
                });
            }
        }
        
        function attachMainEvents() {
            // Rating toggle
            document.getElementById('ratingToggle').addEventListener('click', () => {
                appState.showRatings = !appState.showRatings;
                render();
            });
            
            // Logout
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabase.auth.signOut();
                appState.isLoggedIn = false;
                appState.user = null;
                appState.isLoginMode = true;
                render();
            });
            
            // Tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    appState.currentTab = tab.dataset.tab;
                    render();
                });
            });
            
            // Book cards
            document.querySelectorAll('.book-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    appState.selectedBook = appState.books.find(b => b.id === id);
                    document.getElementById('app').innerHTML += renderDetailModal(appState.selectedBook);
                    attachDetailEvents(appState.selectedBook.id);
                });
            });
            
            // Year headers
            document.querySelectorAll('.year-header').forEach(header => {
                header.addEventListener('click', () => {
                    const year = parseInt(header.dataset.year);
                    if (appState.expandedYears.has(year)) {
                        appState.expandedYears.delete(year);
                    } else {
                        appState.expandedYears.add(year);
                    }
                    render();
                });
            });
            
            // FAB
            document.getElementById('addBtn').addEventListener('click', () => {
                document.getElementById('app').innerHTML += renderAddBookModal();
                attachAddBookEvents();
            });
        }
        
        function attachDetailEvents(bookId) {
            const book = appState.books.find(b => b.id === bookId);
            const closeDetail = document.getElementById('closeDetail');
            const saveDetailBtn = document.getElementById('saveDetailBtn');
            const closeDetailBtn = document.getElementById('closeDetailBtn');
            const deleteBtn = document.getElementById('deleteBtn');
            
            // Rating clicks
            document.querySelectorAll('#detailRating .rating-star').forEach(star => {
                star.addEventListener('click', () => {
                    const rating = parseInt(star.dataset.rating);
                    book.rating = book.rating === rating ? 0 : rating;
                    render();
                    setTimeout(() => {
                        attachDetailEvents(bookId);
                    }, 0);
                });
            });
            
            closeDetail.addEventListener('click', () => {
                document.getElementById('detailModal').remove();
            });
            
            closeDetailBtn.addEventListener('click', () => {
                document.getElementById('detailModal').remove();
            });
            
            saveDetailBtn.addEventListener('click', async () => {
                const notes = document.getElementById('detailNotes').value;
                const status = document.getElementById('detailStatus').value;
                const month = document.getElementById('detailMonth')?.value;
                const year = document.getElementById('detailYear')?.value;
                
                await BookManager.updateBook(bookId, {
                    notes,
                    status,
                    finished_month: month ? parseInt(month) : null,
                    finished_year: year ? parseInt(year) : null,
                });
                
                document.getElementById('detailModal').remove();
            });
            
            deleteBtn.addEventListener('click', async () => {
                if (confirm('Buch wirklich löschen?')) {
                    await BookManager.deleteBook(bookId);
                    document.getElementById('detailModal').remove();
                }
            });
        }
        
        function attachAddBookEvents() {
            const closeAddBook = document.getElementById('closeAddBook');
            const cancelAddBook = document.getElementById('cancelAddBook');
            const submitAddBook = document.getElementById('submitAddBook');
            const cameraBtn = document.getElementById('cameraBtn');
            const galleryBtn = document.getElementById('galleryBtn');
            const barcodeBtn = document.getElementById('barcodeBtn');
            const stopScanner = document.getElementById('stopScanner');
            let coverData = null;
            let barcodeReaderInstance = null;
            
            closeAddBook.addEventListener('click', () => {
                document.getElementById('addBookModal').remove();
            });
            
            cancelAddBook.addEventListener('click', () => {
                document.getElementById('addBookModal').remove();
            });
            
            cameraBtn.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.capture = 'environment';
                input.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            coverData = ev.target.result;
                            document.getElementById('addBookCover').innerHTML = `<img src="${coverData}" class="preview-cover" alt="Cover">`;
                        };
                        reader.readAsDataURL(file);
                    }
                });
                input.click();
            });
            
            galleryBtn.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            coverData = ev.target.result;
                            document.getElementById('addBookCover').innerHTML = `<img src="${coverData}" class="preview-cover" alt="Cover">`;
                        };
                        reader.readAsDataURL(file);
                    }
                });
                input.click();
            });
            
            barcodeBtn.addEventListener('click', async () => {
                document.getElementById('addBookStep1').style.display = 'none';
                document.getElementById('barcodeScannerView').style.display = 'block';
                
                const video = document.getElementById('video');
                const scannerError = document.getElementById('scannerError');
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' }
                    });
                    video.srcObject = stream;
                    
                    // Use ZXing barcode scanner
                    const codeReader = new ZXing.BrowserMultiFormatReader();
                    
                    const decodingInterval = setInterval(async () => {
                        try {
                            const result = await codeReader.decodeFromVideoElement(video);
                            if (result) {
                                clearInterval(decodingInterval);
                                stream.getTracks().forEach(t => t.stop());
                                
                                const isbn = result.getText();
                                await fetchBookFromISBN(isbn);
                            }
                        } catch (error) {
                            // Continue scanning
                        }
                    }, 500);
                    
                    stopScanner.addEventListener('click', () => {
                        clearInterval(decodingInterval);
                        stream.getTracks().forEach(t => t.stop());
                        document.getElementById('barcodeScannerView').style.display = 'none';
                        document.getElementById('addBookStep1').style.display = 'block';
                    });
                    
                } catch (error) {
                    scannerError.textContent = 'Kamera nicht verfügbar. Bitte nutze Foto-Option.';
                }
            });
            
            async function fetchBookFromISBN(isbn) {
                const addTitle = document.getElementById('addTitle');
                const addAuthor = document.getElementById('addAuthor');
                const scannerError = document.getElementById('scannerError');
                
                try {
                    const response = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
                    const data = await response.json();
                    
                    const bookData = data[`ISBN:${isbn}`];
                    
                    if (bookData) {
                        if (bookData.title) addTitle.value = bookData.title;
                        if (bookData.authors && bookData.authors[0]) {
                            addAuthor.value = bookData.authors[0].name;
                        }
                        
                        if (bookData.cover && (bookData.cover.large || bookData.cover.medium)) {
                            const coverUrl = bookData.cover.large || bookData.cover.medium;
                            const imgResponse = await fetch(coverUrl);
                            const blob = await imgResponse.blob();
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                coverData = e.target.result;
                                document.getElementById('addBookCover').innerHTML = `<img src="${coverData}" class="preview-cover" alt="Cover">`;
                            };
                            reader.readAsDataURL(blob);
                        }
                    } else {
                        scannerError.textContent = 'Buch nicht gefunden. Bitte Daten manuell eingeben.';
                    }
                    
                    document.getElementById('barcodeScannerView').style.display = 'none';
                    document.getElementById('addBookStep1').style.display = 'block';
                    
                } catch (error) {
                    scannerError.textContent = 'Fehler beim Abrufen der Buchinfos';
                }
            }
            
            submitAddBook.addEventListener('click', async () => {
                const title = document.getElementById('addTitle').value.trim();
                const author = document.getElementById('addAuthor').value.trim();
                const status = document.getElementById('addStatus').value;
                
                if (!title && !coverData) {
                    alert('Bitte Titel eingeben oder Cover hinzufügen');
                    return;
                }
                
                submitAddBook.disabled = true;
                submitAddBook.textContent = 'Wird gespeichert...';
                
                await BookManager.addBook(title, author, status, coverData);
                
                document.getElementById('addBookModal').remove();
            });
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        
        async function init() {
            // Check if user is already logged in
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                appState.isLoggedIn = true;
                appState.user = user;
                await BookManager.loadBooks();
            } else {
                appState.isLoggedIn = false;
                appState.isLoginMode = true;
            }
            
            render();
        }
        
        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {
                console.log('Service Worker not available');
            });
        }
        
        // Start app
        init();
    </script>
